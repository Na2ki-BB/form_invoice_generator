services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: form_invoice_generator
      POSTGRES_USER: form_invoice_generator
      POSTGRES_PASSWORD: local_development_only
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U form_invoice_generator -d form_invoice_generator"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
